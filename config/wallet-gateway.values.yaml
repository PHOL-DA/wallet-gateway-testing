config:
  kernel:
    id: remote-da
    clientType: remote
    publicUrl: "http://localhost:8080/api/wallets"
  server:
    port: 3030
    dappPath: "/api/v0/dapp"
    userPath: "/api/v0/user"
    allowedOrigins: "*"
    requestSizeLimit: "5mb"
    requestRateLimit: 100
  store:
    connection:
      type: sqlite
      database: store.sqlite
    idps: [
            {
                "id": "idp-self-signed",
                "type": "self_signed",
                "issuer": "unsafe-auth"
            }
          ]
    networks: [
      {
                "id": "canton:localnet",
                "name": "LocalNet",
                "description": "LocalNet configuration",
                "identityProviderId": "idp-self-signed",
                "auth": {
                    "method": "self_signed",
                    "issuer": "self-signed",
                    "audience": "https://canton.network.global",
                    "scope": "openid daml_ledger_api offline_access",
                    "clientId": "ledger-api-user",
                    "clientSecret": "unsafe"
                },
                "adminAuth": {
                    "method": "self_signed",
                    "issuer": "self-signed",
                    "scope": "openid daml_ledger_api offline_access",
                    "audience": "https://canton.network.global",
                    "clientId": "ledger-api-user",
                    "clientSecret": "unsafe"
                },
                "ledgerApi": {
                    # this is the usual port for KIND (to call out of the pod to the local machine)
                    "baseUrl": "http://172.18.0.1:2975"
                }
            }
    ]
  signingStore:
    connection:
      type: sqlite
      database: signing_store.sqlite
