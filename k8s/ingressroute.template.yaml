apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wallet-strip-prefix
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - /api/wallets
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: splice-portfolio-with-wallet-api
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/api/wallets`)
      priority: 100
      middlewares:
        - name: wallet-strip-prefix
      services:
        - name: ${WALLET_SERVICE_NAME}
          port: ${WALLET_SERVICE_PORT}
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/`)
      priority: 1
      services:
        - name: ${SPLICE_SERVICE_NAME}
          port: ${SPLICE_SERVICE_PORT}
