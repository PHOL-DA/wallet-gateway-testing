apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wallet-strip-prefix
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - /api/wallets
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wallet-login-redirect
  namespace: ${NAMESPACE}
spec:
  redirectRegex:
    regex: ^/login/?(.*)
    replacement: /api/wallets/login/$1
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: splice-portfolio-with-wallet-api
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/api/wallets`)
      priority: 100
      middlewares:
        - name: wallet-strip-prefix
      services:
        - name: ${WALLET_SERVICE_NAME}
          port: ${WALLET_SERVICE_PORT}
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/assets`) && HeaderRegexp(`Referer`, `^https?://localhost(:8080)?/(api/wallets|login)(/|$).*`)
      priority: 90
      services:
        - name: ${WALLET_SERVICE_NAME}
          port: ${WALLET_SERVICE_PORT}
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/login`)
      middlewares:
        - name: wallet-login-redirect
      priority: 90
      services:
        - name: ${WALLET_SERVICE_NAME}
          port: ${WALLET_SERVICE_PORT}
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/api/v0`) && HeaderRegexp(`Referer`, `^https?://localhost(:8080)?/(api/wallets|login)(/|$).*`)
      priority: 90
      services:
        - name: ${WALLET_SERVICE_NAME}
          port: ${WALLET_SERVICE_PORT}
    - kind: Rule
      match: Host(`localhost`) && PathPrefix(`/`)
      priority: 1
      services:
        - name: ${SPLICE_SERVICE_NAME}
          port: ${SPLICE_SERVICE_PORT}
